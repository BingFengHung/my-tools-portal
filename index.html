<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>WebHub - 我的 GitHub Pages 工具箱</title>
  
  <!-- PWA & iOS Specific Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WebHub">
  <meta name="format-detection" content="telephone=no">
  <link rel="apple-touch-icon" href="icon.svg">
  
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Animated Background Gradients -->
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>

  <header>
    <div class="profile-container">
      <img src="https://github.com/BingFengHung.png" alt="Profile" class="profile-avatar" onerror="this.src='icon.svg'">
      <div class="profile-info">
        <h1>WebHub</h1>
        <p>@BingFengHung 的網頁工具箱</p>
      </div>
    </div>
    <div class="header-actions">
      <!-- View Switcher -->
      <div class="view-switch">
        <button class="switch-btn active" id="view-card" title="卡片檢視">🎴</button>
        <button class="switch-btn" id="view-icon" title="圖標檢視">📱</button>
      </div>
      <button class="icon-btn" id="refresh-btn" title="清除快取並刷新">🔄</button>
      <button class="pwa-btn" id="install-btn" style="display: none;">安裝 App</button>
    </div>
  </header>

  <main>
    <section class="section-container">
      <div class="section-header-row">
        <h2 class="section-title">✨ 我的線上工具箱 <span>My Tool Suite</span></h2>
        <div class="search-wrapper">
          <input type="text" id="search-input" placeholder="搜尋專案名稱...">
          <span class="search-icon">🔍</span>
        </div>
      </div>

      <div id="loading-state" class="loading-container">
        <div class="spinner"></div>
        <p>正在載入 GitHub Pages 專案...</p>
      </div>

      <!-- Combined Grid for ALL Tools -->
      <div id="tools-grid" class="core-grid" style="display: none;">
        <!-- Both core and fetched projects will be rendered here dynamically -->
      </div>

      <div id="empty-state" class="empty-container" style="display: none;">
        <p>沒有找到符合的專案</p>
      </div>
    </section>
  </main>

  <!-- PWA iOS Manual Guide Dialog -->
  <div class="modal" id="pwa-modal">
    <div class="modal-content">
      <button class="modal-close" id="modal-close">✕</button>
      <h2>安裝至 iPhone 主畫面</h2>
      <p style="color: var(--text-dim); margin-bottom: 20px; font-size: 0.9rem;">請使用 Safari 瀏覽器以獲得完整桌面捷徑體驗：</p>
      <div class="modal-steps">
        <div class="modal-step">
          <div class="step-num">1</div>
          <div>點擊底部工具列的 <strong>分享圖示</strong> (⎙ 或 <span style="font-size: 1.1rem;">⎙</span>)</div>
        </div>
        <div class="modal-step">
          <div class="step-num">2</div>
          <div>在選單中向下捲動，點擊 <strong>「加入主畫面」</strong></div>
        </div>
        <div class="modal-step">
          <div class="step-num">3</div>
          <div>點擊右上角的 <strong>「新增」</strong> 即可安裝！</div>
        </div>
      </div>
    </div>
  </div>

  <!-- QR Code Modal Dialog -->
  <div class="modal" id="qr-modal">
    <div class="modal-content text-center">
      <button class="modal-close" id="qr-close">✕</button>
      <h2 style="font-size: 1.2rem; margin-bottom: 15px;">掃描開啟此工具</h2>
      <div class="qr-container">
        <img id="qr-image" src="" alt="QR Code">
      </div>
      <p id="qr-text" style="color: var(--text-dim); font-size: 0.85rem; margin-top: 10px; word-break: break-all;"></p>
    </div>
  </div>

  <div class="toast" id="toast-msg">已更新快取資料！</div>

  <script src="app.js"></script>
</body>
</html>
