    <rect x="144" y="144" width="96" height="96" rx="28" fill="none" stroke="#00b4d8" stroke-width="6" opacity="0.8"/>
    <rect x="159" y="159" width="66" height="66" rx="18" fill="#00b4d8" opacity="0.15"/>
    <path d="M174 192 Q183 180 192 192 T210 192" fill="none" stroke="#00b4d8" stroke-width="5" stroke-linecap="round" opacity="0.8"/>

