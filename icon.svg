<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b132b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1c2541;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0b0c10;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6f00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  
  <!-- Outer glowing orbital path -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#glowGrad)" stroke-width="4" filter="url(#glow)" opacity="0.6"/>
  <circle cx="256" cy="256" r="190" fill="none" stroke="#00f2fe" stroke-width="2" opacity="0.3"/>

  <!-- Portal Grid Layout of Apps -->
  <g transform="translate(136, 136)">
