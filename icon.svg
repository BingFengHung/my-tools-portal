    <rect x="0" y="0" width="96" height="96" rx="28" fill="none" stroke="#E94057" stroke-width="6" opacity="0.8"/>
    <rect x="15" y="15" width="66" height="66" rx="18" fill="#E94057" opacity="0.15"/>
    <circle cx="48" cy="48" r="12" fill="#E94057" opacity="0.8"/>

    <!-- Top Right (Spirit Level Theme - Green) -->
    <rect x="144" y="0" width="96" height="96" rx="28" fill="none" stroke="#10B981" stroke-width="6" opacity="0.8"/>
    <rect x="159" y="15" width="66" height="66" rx="18" fill="#10B981" opacity="0.15"/>
    <circle cx="192" cy="38" r="10" fill="#10B981" opacity="0.8"/>

    <!-- Bottom Left (Decision Wheel Theme - Orange/Yellow) -->
    <rect x="0" y="144" width="96" height="96" rx="28" fill="none" stroke="#FF9F43" stroke-width="6" opacity="0.8"/>
    <rect x="15" y="159" width="66" height="66" rx="18" fill="#FF9F43" opacity="0.15"/>
    <path d="M48 174 L36 210 L60 210 Z" fill="#FF9F43" opacity="0.8"/>

